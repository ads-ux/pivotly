# ----------------------------------------------------------------------
# Netlify config for overhauled.ai
# ----------------------------------------------------------------------

[build]
  publish = "."

# Pretty URLs for the new pages — keep .html on disk, serve at clean path
[[redirects]]
  from = "/ai-agents"
  to   = "/ai-agents.html"
  status = 200

[[redirects]]
  from = "/health-check"
  to   = "/health-check.html"
  status = 200

# Also handle the .html versions: redirect them to the clean URL
[[redirects]]
  from = "/ai-agents.html"
  to   = "/ai-agents"
  status = 301

[[redirects]]
  from = "/health-check.html"
  to   = "/health-check"
  status = 301

# Existing pages keep .html (no rewrite needed for contact/privacy/thank-you)
