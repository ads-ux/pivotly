# ----------------------------------------------------------------------
# Netlify config for overhauled.ai
# ----------------------------------------------------------------------

[build]
  publish = "."

# Pretty URLs for the new pages — keep .html on disk, serve at clean path
[[redirects]]
  from = "/ai-agents"
  to   = "/ai-agents.html"
  status = 200

[[redirects]]
  from = "/health-check"
  to   = "/health-check.html"
  status = 200

# .html versions: 301-redirect to clean URL (force=true overrides static serving)
[[redirects]]
  from   = "/ai-agents.html"
  to     = "/ai-agents"
  status = 301
  force  = true

[[redirects]]
  from   = "/health-check.html"
  to     = "/health-check"
  status = 301
  force  = true

# Force /contact to serve the new contact/index.html (overrides legacy contact.html)
[[redirects]]
  from   = "/contact"
  to     = "/contact/index.html"
  status = 200
  force  = true

[[redirects]]
  from   = "/contact.html"
  to     = "/contact"
  status = 301
  force  = true

# Pretty URL for /about
[[redirects]]
  from = "/about"
  to   = "/about/index.html"
  status = 200

[[redirects]]
  from   = "/about.html"
  to     = "/about"
  status = 301
  force  = true
